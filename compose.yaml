services:
  db:
    image: "postgres:13"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432" 
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    env_file:
      - .env.docker   

  backend:
    build:
      context: ./
      target: backend-dev
    ports: 
      - "8080:8080"
    env_file:
      - .env.docker  
    depends_on:
      db:
        condition: service_healthy  
   